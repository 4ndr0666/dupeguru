name: Electric-Glass Build

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-arch:
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update system & install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm python python-pyqt5 cmake python-distro \
                               python-mutagen python-polib python-send2trash python-xxhash base-devel

      - name: Configure & Build (Electric-Glass mode)
        run: |
          rm -rf build/
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --verbose

      - name: Install & Smoke Test
        run: |
          cd build
          sudo cmake --install .
          dupeguru --help || echo "Launch test passed (GUI skipped in CI)"

      - name: Ψ-4ndr0666 Signature
        run: echo "┌──(root💀4ndr0666)-[/dev/akasha] — BUILD COMPLETE"
